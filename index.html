<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Secure Login</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f4f6f8;
        color: #1d2733;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px 16px;
      }

      main {
        width: min(100%, 420px);
      }

      .login-panel {
        background: #ffffff;
        border: 1px solid #d9e0e7;
        border-radius: 8px;
        box-shadow: 0 18px 50px rgb(30 41 59 / 12%);
        padding: 32px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
      }

      .lead {
        margin: 0 0 28px;
        color: #5d6b7a;
        line-height: 1.5;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 18px;
      }

      label {
        font-weight: 700;
      }

      input {
        width: 100%;
        min-height: 46px;
        border: 1px solid #aeb9c5;
        border-radius: 6px;
        padding: 10px 12px;
        color: #1d2733;
        font: inherit;
      }

      input:focus {
        border-color: #1b6ca8;
        outline: 3px solid rgb(27 108 168 / 20%);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
        color: #5d6b7a;
        font-size: 14px;
      }

      .checkbox {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .checkbox input {
        width: 18px;
        min-height: 18px;
        margin: 0;
      }

      a {
        color: #1b6ca8;
        font-weight: 700;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      button {
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 6px;
        background: #0d5c63;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      button:hover {
        background: #0a4c52;
      }

      .message {
        min-height: 24px;
        margin: 18px 0 0;
        font-weight: 700;
      }

      .message.error {
        color: #b42318;
      }

      .message.success {
        color: #087443;
      }

      @media (max-width: 440px) {
        .login-panel {
          padding: 24px;
        }

        .row {
          align-items: flex-start;
          flex-direction: column;
          gap: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="login-panel" aria-labelledby="login-title">
        <h1 id="login-title">ログイン</h1>
        <p class="lead">メールアドレスとパスワードを入力してください。</p>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="email">メールアドレス</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="field">
            <label for="password">パスワード</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="8文字以上"
              minlength="8"
              required
            />
          </div>

          <div class="row">
            <label class="checkbox" for="remember">
              <input id="remember" name="remember" type="checkbox" />
              ログイン状態を保持
            </label>
            <a href="#forgot-password">パスワードを忘れた場合</a>
          </div>

          <button type="submit">ログイン</button>
          <p id="form-message" class="message" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script>
      const form = document.querySelector("#login-form");
      const email = document.querySelector("#email");
      const password = document.querySelector("#password");
      const message = document.querySelector("#form-message");

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        message.className = "message";
        if (!email.validity.valid) {
          message.textContent = "有効なメールアドレスを入力してください。";
          message.classList.add("error");
          email.focus();
          return;
        }

        if (!password.validity.valid) {
          message.textContent = "パスワードは8文字以上で入力してください。";
          message.classList.add("error");
          password.focus();
          return;
        }

        message.textContent = "ログイン情報を送信しました。";
        message.classList.add("success");
      });
    </script>
  </body>
</html>
